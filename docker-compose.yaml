services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: meeter
    volumes:
      - ./:/var/www
    working_dir: /var/www
    depends_on:
      - db

  web:
    image: nginx:latest
    container_name: meeter_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: meeter_db
    restart: always
    environment:
      MYSQL_DATABASE: meeter_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: meeter_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

  node:
    image: node:20
    container_name: meeter_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: tail -f /dev/null

volumes:
  dbdata: