<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      .heart {
        fill: #FF4D6D;
      }

      .gauge {
        fill: none;
        stroke: #2D2D44;
        stroke-width: 10;
        stroke-linecap: round;
      }

      .tick {
        stroke: #2D2D44;
        stroke-width: 6;
        stroke-linecap: round;
      }

      .needle {
        stroke: #2D2D44;
        stroke-width: 8;
        stroke-linecap: round;
      }

      .text {
        font-family: "Poppins", "Nunito", Arial, sans-serif;
        font-size: 88px;
        font-weight: 700;
        fill: #2D2D44;
      }
    </style>
  </defs>

  <!-- Icon -->
  <g transform="translate(40,20) scale(1.45)">

    <!-- Heart -->
    <path class="heart" d="
        M100 220
        C40 175 10 135 10 88
        C10 45 42 15 82 15
        C105 15 125 27 140 48
        C155 27 175 15 198 15
        C238 15 270 45 270 88
        C270 135 240 175 180 220
        L140 252
        Z"></path>

    <!-- Gauge -->
    <path class="gauge" d="M60 105 A80 80 0 0 1 220 105"></path>

    <!-- Ticks -->
    <line class="tick" x1="75" y1="98" x2="66" y2="86"></line>
    <line class="tick" x1="104" y1="74" x2="99" y2="60"></line>
    <line class="tick" x1="140" y1="66" x2="140" y2="50"></line>
    <line class="tick" x1="176" y1="74" x2="181" y2="60"></line>
    <line class="tick" x1="205" y1="98" x2="214" y2="86"></line>

    <!-- Needle -->
    <line class="needle" x1="140" y1="105" x2="188" y2="68"></line>

    <!-- Center -->
    <circle cx="140" cy="105" r="8" fill="#2D2D44"></circle>

  </g>

  <!-- Brand Name -->
  <text x="440" y="170" class="text">meeter</text>

</svg>